<html>
<head>
    <title>Car Loan Calculation</title>
</head>

<body>

<h2>Perform Car Loan Calculation</h2>

<form onsubmit="calculateLoan(); return false;">

    Loan Amount:
    <input type="text" id="amount" required>
    <br><br>

    Loan Period:
    <select id="period">
        <option value="3">3 years</option>
        <option value="4">4 years</option>
        <option value="5">5 years</option>
        <option value="7">7 years</option>
    </select>

    <br><br>

    <input type="submit" value="Submit">
    <input type="reset" value="Cancel" onclick="clearResult()">

</form>

<hr>

<h3>Details of Car Loan:</h3>
<p id="output"></p>

<script>
function calculateLoan() {

    let amount = parseFloat(document.getElementById("amount").value);
    let period = parseInt(document.getElementById("period").value);

    let rate = 0.05;

    let interest = amount * rate * period;
    let totalLoan = amount + interest;

    document.getElementById("output").innerHTML =
        "Loan Request: " + amount + "<br>" +
        "Period of payment: " + period + " years<br>" +
        "Total Loan (+ interest): " + totalLoan;
}

function clearResult() {
    document.getElementById("output").innerHTML = "";
}
</script>

<p style="text-align:center; font-size:14px; color:gray;">
    © 2026 Car Loan Calculator. All Rights Reserved.
</p>

</body>
</html>
